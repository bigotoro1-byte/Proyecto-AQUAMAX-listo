<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQUAMAX</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Tipografía moderna -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET Y BASE
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #f1f5f9;
    font-family: 'Inter', sans-serif;
    color: #1e293b;
}

/* =========================
   CONTENEDOR
========================= */
.container {
    width: 92%;
    max-width: 1280px;
    margin: auto;
}

.container-box {
    padding: 30px 10px;
}

/* =========================
   NAVBAR EMPRESARIAL
========================= */
.navbar-custom {
    background: linear-gradient(90deg, #0f172a, #1e293b);
    border-bottom: 2px solid #0ea5e9;
}

.navbar-custom a {
    color: #e2e8f0 !important;
    margin-right: 18px;
    font-weight: 500;
    text-decoration: none;
    transition: 0.2s;
}

.navbar-custom a:hover {
    color: #38bdf8 !important;
}

/* =========================
   INPUTS Y BOTONES
========================= */
input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    font-size: 15px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
}

button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: linear-gradient(90deg, #0ea5e9, #0284c7);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.02);
    background: linear-gradient(90deg, #0284c7, #0369a1);
}

/* =========================
   CARDS PROFESIONALES
========================= */
.card {
    border: none;
    border-radius: 14px;
    padding: 20px;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* =========================
   TITULOS
========================= */
h1, h2 {
    font-weight: 600;
    margin-bottom: 15px;
}

label {
    font-weight: 500;
    color: #334155;
}

/* =========================
   TABLAS
========================= */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #0f172a;
    color: white;
    padding: 12px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid #e2e8f0;
}

/* =========================
   BADGES / ESTADOS
========================= */
.badge-success {
    background: #22c55e;
    color: white;
    padding: 5px 10px;
    border-radius: 6px;
}

.badge-danger {
    background: #ef4444;
    color: white;
    padding: 5px 10px;
    border-radius: 6px;
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 992px) {
    .navbar-flex {
        flex-direction: column;
        align-items: flex-start !important;
    }

    .nav-links {
        margin-top: 10px;
    }

    .nav-links a {
        display: block;
        margin: 6px 0;
    }
}

@media (max-width: 768px) {
    h1 {
        font-size: 22px;
        text-align: center;
    }

    h2 {
        font-size: 18px;
        text-align: center;
    }

    .container {
        width: 95%;
    }

    table {
        display: block;
        overflow-x: auto;
    }

    button {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-custom p-3">
<div class="container-fluid navbar-flex d-flex justify-content-between align-items-center">

    <div class="nav-links">
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/inventario">📦 Inventario</a>
        <a href="/reporte">📄 Reporte</a>

        {% if session.get("rol") == "admin" %}
        <a href="/productos">📋 Productos</a>
        <a href="/admin/usuarios">👤 Usuarios</a>
        {% endif %}
    </div>

    <div>
        <a href="/logout">🚪 Salir</a>
    </div>

</div>
</nav>

<!-- CONTENIDO DINÁMICO -->
<div class="container container-box">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
