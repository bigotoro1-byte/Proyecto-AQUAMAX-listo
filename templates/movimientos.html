{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
	<h2 class="mb-3">📄 Movimientos</h2>
	<div class="card p-3 shadow-sm">
		<div class="table-responsive">
			<table class="table table-dark table-striped align-middle mb-0">
				<thead>
					<tr>
						<th>Usuario</th>
						<th>Acción</th>
						<th>Producto</th>
						<th>Cantidad</th>
						<th>Fecha</th>
					</tr>
				</thead>
				<tbody>
					{% for d in datos %}
					<tr>
						<td>{{d.Usuario}}</td>
						<td>{{d.Accion}}</td>
						<td>{{d.Producto}}</td>
						<td>{{d.Cantidad}}</td>
						<td>{{d.Fecha}}</td>
					</tr>
					{% endfor %}
				</tbody>
			</table>
		</div>
	</div>
</div>

{% endblock %}
