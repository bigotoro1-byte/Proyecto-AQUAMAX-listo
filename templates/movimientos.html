{% extends "base.html" %}

{% block content %}

<h2>📄 Movimientos</h2>

<table class="table table-dark">
<tr>
<th>Usuario</th><th>Acción</th><th>Producto</th><th>Cantidad</th><th>Fecha</th>
</tr>

{% for d in datos %}
<tr>
<td>{{d.Usuario}}</td>
<td>{{d.Accion}}</td>
<td>{{d.Producto}}</td>
<td>{{d.Cantidad}}</td>
<td>{{d.Fecha}}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
