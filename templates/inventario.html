{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">📦 Inventario</h2>

<div class="row g-4">

<!-- 🟢 AGREGAR STOCK (GENERAL) -->
{% if session.get("rol") == "admin" %}
<div class="col-md-4">
<div class="card shadow p-4">

<h5 class="text-success mb-3">Agregar stock</h5>

<form method="post">

<label>Producto</label>
<select name="producto" class="form-select mb-2">
{% for p in productos %}
<option>{{p[0]}}</option>
{% endfor %}
</select>

<label>Cantidad</label>
<input name="cantidad" class="form-control mb-3" placeholder="Ej: 10">

<button class="btn btn-success w-100">Agregar</button>

</form>

</div>
</div>
{% endif %}

<!-- 🔴 RETIRAR PRODUCTO -->
<div class="col-md-4">
<div class="card shadow p-4">

<h5 class="text-danger mb-3">Retirar producto</h5>

<form action="/salida" method="post">

<label>Producto</label>
<select name="producto" class="form-select mb-2">
{% for p in productos %}
<option>{{p[0]}}</option>
{% endfor %}
</select>

<label>Cantidad</label>
<input name="cantidad" class="form-control mb-2" placeholder="Ej: 5">

<label>Ubicación</label>
<select name="ubicacion" class="form-select mb-3">
<option value="Piscina">Piscina</option>
<option value="Pasillos">Pasillos</option>
<option value="Oficinas">Oficinas</option>
<option value="Otros">Otros</option>
</select>

<button class="btn btn-danger w-100">Retirar</button>

</form>

</div>
</div>

<!-- 📊 STOCK ACTUAL -->
<div class="col-md-4">
<div class="card shadow p-4">

<h5 class="mb-3">Stock actual</h5>

<table class="table table-hover">
<thead>
<tr>
<th>Producto</th>
<th>Ubicación</th>
<th>Cantidad</th>
<th>Usuario</th>
</tr>
</thead>

<tbody>
{% for s in stock_actual %}
<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td><b>{{s[2]}}</b></td>
<td>{{s[3]}}</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>
</div>

</div>

{% endblock %}
