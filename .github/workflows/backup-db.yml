name: Backup PostgreSQL (Daily)

on:
  schedule:
    # Diario 03:00 Colombia aprox (08:00 UTC)
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Falta configurar el secret DATABASE_URL en GitHub."
            exit 1
          fi

      - name: Create backup dump (PostgreSQL 18 client)
        run: |
          mkdir -p backups
          TS=$(date -u +"%Y%m%d_%H%M%S")
          FILE="backups/aquamax_backup_${TS}.sql"
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -v "$PWD/backups:/backups" \
            postgres:18 \
            sh -c 'pg_dump "$DATABASE_URL" --no-owner --no-acl --clean --if-exists > "/backups/aquamax_backup_'"${TS}"'.sql"'
          gzip "$FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: aquamax-db-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          if-no-files-found: error
          retention-days: 30
